[pytest]
pythonpath = . common conserver api

# Load test-environment credentials BEFORE collection so module-level
# ``pytest.mark.skipif(not os.environ.get(...))`` gates see them.
# pytest-dotenv handles this; conftest.py's load_dotenv runs too late
# (it's an autouse fixture that fires after collection).
env_files = .env.test

log_cli = 1
log_cli_level = INFO

markers =
    integration: mark a test as an integration test.
